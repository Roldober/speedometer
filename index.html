<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Спидометр · Реальная скорость GPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            margin: 0;
        }
        .instrument-cluster {
            background: radial-gradient(circle at 30% 35%, #1c1f2a, #090a0f);
            border-radius: 60px;
            padding: 2.5rem 3rem 2rem;
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 450px;
            width: 100%;
        }
        .gauge-container {
            position: relative;
            width: 340px;
            height: 340px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .readout {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.7rem;
        }
        .digital-speed {
            background: #0c0e14;
            padding: 0.5rem 2.2rem;
            border-radius: 40px;
            border: 1px solid #3b4055;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.9);
            font-size: 3.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #f2f5ff;
            text-shadow: 0 0 14px #ff7b3b;
            line-height: 1.1;
            display: flex;
            align-items: baseline;
            gap: 0.25rem;
        }
        .unit {
            font-size: 1rem;
            font-weight: 500;
            color: #8f9bb5;
            letter-spacing: 1px;
            text-shadow: none;
            margin-left: 0.2rem;
        }
        .status-row {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .status-badge {
            background: rgba(20, 24, 34, 0.8);
            backdrop-filter: blur(12px);
            padding: 0.5rem 1.4rem;
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #cbd2e8;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4d4d;
            box-shadow: 0 0 10px #ff4d4d;
            transition: all 0.3s;
        }
        .status-dot.active {
            background: #4cff4c;
            box-shadow: 0 0 14px #4cff4c;
        }
        .accuracy-text {
            color: #8f9bb5;
            font-size: 0.8rem;
        }
        .warning-box {
            background: rgba(255, 80, 30, 0.1);
            border: 1px solid rgba(255, 100, 40, 0.35);
            border-radius: 14px;
            padding: 0.7rem 1rem;
            margin-top: 0.6rem;
            text-align: center;
            color: #ffb08c;
            font-size: 0.8rem;
            line-height: 1.5;
            max-width: 300px;
        }
        .btn {
            background: rgba(25, 29, 40, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #dce3f5;
            font-weight: 500;
            padding: 0.5rem 1.3rem;
            border-radius: 2.5rem;
            font-size: 0.85rem;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
            margin-top: 0.4rem;
        }
        .btn:hover {
            background: #2c334a;
            border-color: rgba(255, 255, 255, 0.35);
            color: white;
        }
        @media (max-width: 480px) {
            .gauge-container {
                width: 270px;
                height: 270px;
            }
            .instrument-cluster {
                padding: 1.5rem 1.2rem 1.2rem;
                border-radius: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="instrument-cluster">
        <div class="gauge-container">
            <canvas id="speedoCanvas" width="420" height="420" aria-label="Спидометр реальной скорости 0–260 км/ч"></canvas>
        </div>

        <div class="readout">
            <div class="digital-speed">
                <span id="digitalValue">0</span><span class="unit">km/h</span>
            </div>
            <div class="status-row">
                <div class="status-badge">
                    <span id="gpsDot" class="status-dot"></span>
                    <span id="gpsStatus">Запрос геолокации...</span>
                </div>
                <span class="accuracy-text" id="accuracyInfo"></span>
            </div>
            <div id="warningBox" class="warning-box" style="display: none;"></div>
            <button id="retryBtn" class="btn" style="display: none;">🔄 Попробовать снова</button>
        </div>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById('speedoCanvas');
            const ctx = canvas.getContext('2d');

            const MIN_SPEED = 0;
            const MAX_SPEED = 260;
            const START_ANGLE = Math.PI * 0.78;
            const END_ANGLE = Math.PI * 2.22;

            let currentSpeed = 0;
            let targetSpeed = 0;
            let animationFrame = null;

            const digitalValue = document.getElementById('digitalValue');
            const gpsDot = document.getElementById('gpsDot');
            const gpsStatus = document.getElementById('gpsStatus');
            const accuracyInfo = document.getElementById('accuracyInfo');
            const warningBox = document.getElementById('warningBox');
            const retryBtn = document.getElementById('retryBtn');

            let watchId = null;

            function speedToAngle(speed) {
                const clamped = Math.min(MAX_SPEED, Math.max(MIN_SPEED, speed));
                return START_ANGLE + (clamped / MAX_SPEED) * (END_ANGLE - START_ANGLE);
            }

            function drawGauge(speed) {
                const w = canvas.width;
                const h = canvas.height;
                ctx.clearRect(0, 0, w, h);

                const cx = w / 2;
                const cy = h / 2;
                const outerRadius = Math.min(w, h) * 0.43;
                const scaleRadius = outerRadius * 0.84;
                const numberRadius = outerRadius * 0.7;
                const smallTickRadius = outerRadius * 0.88;

                const bgGrad = ctx.createRadialGradient(cx - 8, cy - 8, outerRadius * 0.15, cx, cy, outerRadius * 1.02);
                bgGrad.addColorStop(0, '#1a1e2c');
                bgGrad.addColorStop(0.8, '#0b0d14');
                bgGrad.addColorStop(1, '#020303');
                ctx.beginPath();
                ctx.arc(cx, cy, outerRadius, 0, 2 * Math.PI);
                ctx.fillStyle = bgGrad;
                ctx.fill();
                ctx.strokeStyle = '#3d4358';
                ctx.lineWidth = 2.3;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(cx, cy, outerRadius - 5, 0, 2 * Math.PI);
                ctx.strokeStyle = '#2d3245';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.font = '500 16px "Inter", "Segoe UI", "Roboto", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 5;

                for (let s = MIN_SPEED; s <= MAX_SPEED; s += 20) {
                    const angle = speedToAngle(s);
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(cosA * scaleRadius, sinA * scaleRadius);
                    ctx.lineTo(cosA * (scaleRadius - 18), sinA * (scaleRadius - 18));
                    ctx.strokeStyle = '#e9efff';
                    ctx.lineWidth = 2.8;
                    ctx.stroke();
                    ctx.fillStyle = '#f0f4ff';
                    ctx.fillText(s.toString(), cosA * numberRadius, sinA * numberRadius);
                }
                for (let s = MIN_SPEED; s <= MAX_SPEED; s += 10) {
                    if (s % 20 === 0) continue;
                    const angle = speedToAngle(s);
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(cosA * smallTickRadius, sinA * smallTickRadius);
                    ctx.lineTo(cosA * (smallTickRadius - 11), sinA * (smallTickRadius - 11));
                    ctx.strokeStyle = '#b5bedb';
                    ctx.lineWidth = 1.7;
                    ctx.stroke();
                }
                for (let s = MIN_SPEED; s <= MAX_SPEED; s += 5) {
                    if (s % 10 === 0) continue;
                    const angle = speedToAngle(s);
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(cosA * (smallTickRadius - 4), sinA * (smallTickRadius - 4));
                    ctx.lineTo(cosA * (smallTickRadius - 12), sinA * (smallTickRadius - 12));
                    ctx.strokeStyle = '#626b8a';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                ctx.restore();

                const needleAngle = speedToAngle(currentSpeed);
                const needleLength = scaleRadius * 0.92;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(needleAngle);
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 14;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.beginPath();
                ctx.moveTo(needleLength - 3, 0);
                ctx.lineTo(-7, -5.8);
                ctx.lineTo(-7, 5.8);
                ctx.closePath();
                const needleGrad = ctx.createLinearGradient(-8, 0, needleLength, 0);
                needleGrad.addColorStop(0, '#ff5722');
                needleGrad.addColorStop(0.85, '#ff8c42');
                needleGrad.addColorStop(1, '#ffb86c');
                ctx.fillStyle = needleGrad;
                ctx.fill();
                ctx.strokeStyle = '#351f12';
                ctx.lineWidth = 1.2;
                ctx.stroke();
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(0, 0, 16, 0, 2 * Math.PI);
                ctx.fillStyle = '#191d28';
                ctx.fill();
                ctx.strokeStyle = '#bcc6e0';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, 0, 7, 0, 2 * Math.PI);
                ctx.fillStyle = '#eef3ff';
                ctx.fill();
                ctx.strokeStyle = '#0e121c';
                ctx.lineWidth = 1.7;
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.font = '500 14px "Inter", "Segoe UI"';
                ctx.fillStyle = '#a1accc';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 6;
                ctx.textAlign = 'center';
                ctx.fillText('km/h', cx, cy + 58);
                ctx.restore();
            }

            function updateDigital(speed) {
                const display = Math.round(speed * 10) / 10;
                digitalValue.textContent = display.toFixed(1).replace(/\.0$/, '');
            }

            function animateLoop() {
                const delta = targetSpeed - currentSpeed;
                if (Math.abs(delta) < 0.04) {
                    currentSpeed = targetSpeed;
                    drawGauge(currentSpeed);
                    updateDigital(currentSpeed);
                    animationFrame = null;
                    return;
                }
                currentSpeed += delta * 0.16;
                drawGauge(currentSpeed);
                updateDigital(currentSpeed);
                animationFrame = requestAnimationFrame(animateLoop);
            }

            function startAnimation() {
                if (animationFrame === null) {
                    if (Math.abs(targetSpeed - currentSpeed) > 0.03) {
                        animationFrame = requestAnimationFrame(animateLoop);
                    } else {
                        drawGauge(currentSpeed);
                        updateDigital(currentSpeed);
                    }
                }
            }

            function setGPSSpeed(speedKmh) {
                const clamped = Math.min(MAX_SPEED, Math.max(MIN_SPEED, speedKmh));
                if (targetSpeed === clamped) return;
                targetSpeed = clamped;
                startAnimation();
            }

            function updateGPSStatus(active, accuracy = null) {
                if (active) {
                    gpsDot.className = 'status-dot active';
                    gpsStatus.textContent = 'GPS активен';
                    accuracyInfo.textContent = accuracy !== null ? `±${Math.round(accuracy)} м` : '';
                } else {
                    gpsDot.className = 'status-dot';
                    gpsStatus.textContent = 'Нет сигнала';
                    accuracyInfo.textContent = '';
                }
            }

            function showWarning(message, showRetry = false) {
                warningBox.style.display = 'block';
                warningBox.textContent = message;
                retryBtn.style.display = showRetry ? 'inline-block' : 'none';
            }

            function hideWarning() {
                warningBox.style.display = 'none';
                retryBtn.style.display = 'none';
            }

            function handlePosition(position) {
                const speedMps = position.coords.speed;
                const accuracy = position.coords.accuracy;

                if (speedMps !== null && speedMps >= 0) {
                    const speedKmh = speedMps * 3.6;
                    setGPSSpeed(speedKmh);
                } else {
                    setGPSSpeed(0);
                }

                updateGPSStatus(true, accuracy);
                hideWarning();
            }

            function handleError(error) {
                updateGPSStatus(false);
                setGPSSpeed(0);

                switch (error.code) {
                    case error.PERMISSION_DENIED:
                        showWarning('Доступ к геолокации запрещён. Разрешите в настройках браузера.', true);
                        break;
                    case error.POSITION_UNAVAILABLE:
                        showWarning('Местоположение недоступно. Включите GPS.', true);
                        break;
                    case error.TIMEOUT:
                        showWarning('Таймаут. Попробуйте снова.', true);
                        break;
                    default:
                        showWarning('Ошибка: ' + error.message, true);
                }
            }

            function startGeolocation() {
                if (!navigator.geolocation) {
                    showWarning('Браузер не поддерживает геолокацию.');
                    updateGPSStatus(false);
                    return;
                }

                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                }

                hideWarning();
                updateGPSStatus(false);
                gpsStatus.textContent = 'Захват спутников...';

                watchId = navigator.geolocation.watchPosition(
                    handlePosition,
                    handleError,
                    {
                        enableHighAccuracy: true,
                        maximumAge: 1000,
                        timeout: 15000
                    }
                );
            }

            retryBtn.addEventListener('click', startGeolocation);

            window.addEventListener('load', () => {
                currentSpeed = 0;
                targetSpeed = 0;
                drawGauge(0);
                updateDigital(0);
                startGeolocation();
            });

            window.addEventListener('beforeunload', () => {
                if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                if (animationFrame !== null) cancelAnimationFrame(animationFrame);
            });
        })();
    </script>
</body>
</html>
